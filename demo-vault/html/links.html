<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Links Demo</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    h1 { color: #f5c2e7; }
    a {
      color: #89b4fa;
      text-decoration: underline;
    }
    a:hover { color: #74c7ec; }
    ul { line-height: 2; }
  </style>
</head>
<body>
  <h1>Links Demo</h1>
  <p>Links inside embedded HTML open in a new browser tab:</p>
  <ul>
    <li><a href="https://obsidian.md">Obsidian</a></li>
    <li><a href="https://github.com/mnaoumov/obsidian-embed-html">Plugin Repository</a></li>
    <li><a href="https://developer.mozilla.org/en-US/docs/Web/HTML">MDN HTML Reference</a></li>
  </ul>
</body>
</html>
